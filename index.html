<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GM TICKETS TI</title>
  <link rel="icon" type="image/png" href="/IMG/2.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/css.css">

  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
    }

    :root {
      --navy:    #0b1629;
      --navy2:   #0f1e36;
      --blue:    #1a4fc4;
      --blue2:   #2563eb;
      --accent:  #3b82f6;
      --white:   #f0f4ff;
      --muted:   #8fa3c8;
      --border:  rgba(255,255,255,0.07);
      --glass:   rgba(255,255,255,0.04);
      --error:   #f87171;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Fondo con malla geométrica ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        linear-gradient(135deg, #0b1629 0%, #0d1f3c 55%, #071428 100%);
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(59,130,246,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,.06) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .bg-glow {
      position: fixed; z-index: 2;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
    }
    .bg-glow-1 {
      width: 600px; height: 500px;
      background: radial-gradient(circle, rgba(26,79,196,.25) 0%, transparent 70%);
      top: -150px; left: -100px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .bg-glow-2 {
      width: 500px; height: 400px;
      background: radial-gradient(circle, rgba(59,130,246,.15) 0%, transparent 70%);
      bottom: -100px; right: -80px;
      animation: drift2 15s ease-in-out infinite alternate;
    }

    @keyframes drift1 { to { transform: translate(60px, 80px); } }
    @keyframes drift2 { to { transform: translate(-40px, -60px); } }

    /* ── Contenedor principal ── */
    .page {
      position: relative; z-index: 10;
      display: flex;
      align-items: stretch;
      width: min(860px, 96vw);
      min-height: 520px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 40px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03);
      animation: fadeUp .6s cubic-bezier(.22,.9,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Panel izquierdo (decorativo) ── */
    .panel-left {
      flex: 0 0 320px;
      background: linear-gradient(145deg, #102040 0%, #0c1a30 100%);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 24px,
          rgba(59,130,246,.03) 24px,
          rgba(59,130,246,.03) 25px
        );
    }

    .brand {
      position: relative;
      z-index: 1;
    }

    .brand-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--blue), var(--accent));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(26,79,196,.4);
    }

    .brand-icon svg { width: 22px; height: 22px; }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -.5px;
    }

    .brand-name span {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: .5px;
      margin-top: 4px;
      font-family: 'DM Sans', sans-serif;
    }

    /* Stats decorativas */
    .stats {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--accent);
    }
    .stat-dot.green { background: #34d399; box-shadow: 0 0 8px #34d399; }
    .stat-dot.amber { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; }

    .stat-text {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }
    .stat-text strong { color: var(--white); font-weight: 500; }

    /* Numero decorativo grande */
    .deco-num {
      position: absolute;
      bottom: -10px; right: -10px;
      font-family: 'Syne', sans-serif;
      font-size: 160px;
      font-weight: 800;
      color: rgba(59,130,246,.04);
      line-height: 1;
      user-select: none;
    }

    /* ── Panel derecho (formulario) ── */
    .panel-right {
      flex: 1;
      background: #0e1d33;
      padding: 52px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-heading {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 6px;
      letter-spacing: -.5px;
    }

    .form-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
      font-weight: 300;
    }

    /* Campos */
    .field {
      margin-bottom: 20px;
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .ico {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      display: flex; align-items: center;
      pointer-events: none;
      transition: color .2s;
    }

    .input-wrap input {
      width: 100%;
      padding: 13px 44px;
      background: rgba(255,255,255,.05) !important;
      border: 1px solid rgba(255,255,255,.1) !important;
      border-radius: 10px !important;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--white) !important;
      transition: border-color .2s, background .2s, box-shadow .2s;
      box-shadow: none !important;
    }

    .input-wrap input::placeholder { color: rgba(143,163,200,.45); }

    .input-wrap input:focus {
      outline: none;
      border-color: var(--accent) !important;
      background: rgba(59,130,246,.07) !important;
      box-shadow: 0 0 0 3px rgba(59,130,246,.15) !important;
    }

    .input-wrap input:focus ~ .ico,
    .input-wrap:focus-within .ico { color: var(--accent); }

    .toggle-pass {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none !important;
      border: none !important;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      display: flex; align-items: center;
      box-shadow: none !important;
      width: auto !important;
      border-radius: 0 !important;
      transition: color .2s;
    }
    .toggle-pass:hover {
      color: var(--white) !important;
      background: none !important;
      transform: translateY(-50%) !important;
    }

    /* Botón */
    .btn-login {
      width: 100% !important;
      padding: 14px !important;
      background: linear-gradient(135deg, var(--blue), var(--blue2)) !important;
      color: #fff !important;
      border: none !important;
      border-radius: 10px !important;
      font-size: 15px !important;
      font-weight: 600 !important;
      font-family: 'Syne', sans-serif !important;
      letter-spacing: .04em;
      cursor: pointer !important;
      margin-top: 8px !important;
      transition: opacity .2s, transform .1s, box-shadow .2s !important;
      box-shadow: 0 6px 20px rgba(26,79,196,.35) !important;
      display: flex !important;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      opacity: .9 !important;
      transform: translateY(-1px) !important;
      box-shadow: 0 10px 28px rgba(26,79,196,.45) !important;
      color: #fff !important;
    }

    .btn-login:active { transform: translateY(0) scale(.99) !important; }
    .btn-login:disabled { opacity: .55 !important; cursor: not-allowed !important; transform: none !important; }

    /* Spinner dentro del botón */
    .btn-spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    #login-error {
      font-size: 13px;
      color: var(--error);
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    /* Pie */
    .form-footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: rgba(143,163,200,.55);
      text-align: center;
    }
    .form-footer a { color: var(--accent); text-decoration: none; }
    .form-footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .panel-left  { display: none; }
      .panel-right { padding: 40px 28px; }
      .page { min-height: auto; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="page">

    <!-- Panel izquierdo -->
    <div class="panel-left">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <path d="M2 10h20"/>
          </svg>
        </div>
        <div class="brand-name">
          GM Tickets TI
          <span>Sistema de gestión</span>
        </div>
      </div>

      <div class="stats">
        <div class="stat-row">
          <div class="stat-dot green"></div>
          <div class="stat-text"><strong>Sistema activo</strong><br>Todos los servicios operando</div>
        </div>
        <div class="stat-row">
          <div class="stat-dot"></div>
          <div class="stat-text"><strong>Acceso seguro</strong><br>Conexión cifrada y verificada</div>
        </div>
        <div class="stat-row">
          <div class="stat-dot amber"></div>
          <div class="stat-text"><strong>Soporte 24/7</strong><br>Área de TI disponible</div>
        </div>
      </div>

      <div class="deco-num">TI</div>
    </div>

    <!-- Panel derecho -->
    <div class="panel-right">
      <p class="form-heading">Bienvenido</p>
      <p class="form-sub">Ingresa tus credenciales para continuar</p>

      <div class="field">
        <label class="field-label" for="username">Usuario</label>
        <div class="input-wrap">
          <span class="ico">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </span>
          <input type="text" id="username" placeholder="Tu usuario" autocomplete="username">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Contraseña</label>
        <div class="input-wrap">
          <span class="ico">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password"
            onkeydown="if(event.key==='Enter') login()">
          <button class="toggle-pass" type="button" onclick="togglePassword()" title="Ver contraseña">
            <svg id="eye-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-login" id="btn-login" onclick="login()">
        <div class="btn-spinner" id="btn-spinner"></div>
        <span id="btn-text">Ingresar</span>
        <svg width="16" height="16" id="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <p id="login-error" class="error"></p>

      <div class="form-footer">
        ¿Problemas para acceder? Contacta a <a href="#">soporte TI</a>
      </div>
    </div>

  </div>

  <script src="JS/js.js"></script>

  <script>
    // ── Ojo: mostrar/ocultar contraseña ──
    function togglePassword() {
      const input = document.getElementById("password");
      const icon  = document.getElementById("eye-icon");
      if (input.type === "password") {
        input.type = "text";
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
      } else {
        input.type = "password";
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      }
    }

    // ── Parche para el botón ──
    // js.js hace btn.disabled = true y btn.textContent = "Verificando..." en el finally.
    // Sobreescribimos textContent con un setter que actualiza solo el <span> interno,
    // preservando el spinner y la flecha del nuevo diseño.
    (function patchBtn() {
      const btn     = document.getElementById('btn-login');
      const spinner = document.getElementById('btn-spinner');
      const arrow   = document.getElementById('btn-arrow');
      const text    = document.getElementById('btn-text');

      // Interceptar disabled para mostrar/ocultar spinner
      const origDescriptor = Object.getOwnPropertyDescriptor(HTMLButtonElement.prototype, 'disabled');
      Object.defineProperty(btn, 'disabled', {
        get() { return origDescriptor.get.call(this); },
        set(val) {
          origDescriptor.set.call(this, val);
          if (val) {
            spinner.style.display = 'block';
            arrow.style.display   = 'none';
          } else {
            spinner.style.display = 'none';
            arrow.style.display   = 'block';
          }
        }
      });

      // Interceptar textContent para redirigir al <span> interno
      Object.defineProperty(btn, 'textContent', {
        get() { return text.textContent; },
        set(val) {
          // js.js asigna "Verificando..." y "Ingresar" — los mapeamos
          const map = {
            'Verificando...': 'Verificando...',
            'Ingresar':       'Ingresar'
          };
          text.textContent = map[val?.trim()] ?? val;
        }
      });
    })();
  </script>

</body>
</html>
